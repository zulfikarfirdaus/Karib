name = "karib"
main = ".open-next/worker.js"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm", "**/*.wasm?module"]
fallthrough = true

[[rules]]
type = "Data"
globs = ["**/*.bin"]
fallthrough = true
